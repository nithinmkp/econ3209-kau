format:
  html:
    theme:
      - cosmo
      - assets/kau-theme.scss
    highlight-style: github
    code-copy: true
    code-overflow: wrap
    toc: true
    toc-depth: 3
    number-sections: false
    smooth-scroll: true
    html-math-method: mathjax

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
