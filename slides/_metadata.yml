# Shared metadata for all lecture slide decks
# Inherited by every .qmd file under slides/

format:
  revealjs:
    theme: [default, ../../assets/slides-theme.scss]
    width: 1280
    height: 720
    slide-number: true
    show-slide-number: all
    progress: true
    history: true
    hash: true
    controls: true
    controls-layout: bottom-right
    transition: slide
    background-transition: fade
    incremental: false
    smaller: false
    scrollable: true
    preview-links: auto
    footer: "ECON 3209 — Kerala Agricultural University"
    chalkboard:
      theme: chalkboard
    highlight-style: monokai
    code-line-numbers: true
    html-math-method: mathjax
    include-in-header:
      text: |
        <style>
          .reveal .slide-number { color: #DAB300; }
          .reveal footer { color: #7AB87A; font-size: 0.7em; }
          /* Hide Pyodide startup status banner */
          .qp-status, .qp-status-container,
          div[class*="pyodide-status"], div[id*="pyodide-status"],
          .cell-output-display > p:first-child:empty { display: none !important; }
          /* KAU logo in slide corner */
          #kau-slide-logo {
            position: fixed; bottom: 14px; right: 14px;
            height: 45px; width: auto; z-index: 1000;
            pointer-events: none;
          }
          /* ── Pyodide / Monaco Editor — dark theme ── */
          /* Editor container */
          .qpyodide-editor {
            border: 1px solid #444 !important;
            border-radius: 0.3em !important;
          }
          /* Monaco editor background */
          .qpyodide-editor .monaco-editor,
          .qpyodide-editor .monaco-editor-background,
          .qpyodide-editor .monaco-editor .margin,
          .qpyodide-editor .monaco-editor .monaco-editor-background {
            background-color: #1e1e1e !important;
          }
          /* Monaco cursor & selection */
          .qpyodide-editor .monaco-editor .cursors-layer .cursor {
            background: #DAB300 !important;
          }
          /* Toolbar strip above Monaco */
          .qpyodide-editor-toolbar {
            background-color: #2a2a2a !important;
            border-bottom: 1px solid #444 !important;
            padding: 0.2rem 0.5rem;
          }
          /* Run / Reset buttons */
          .qpyodide-button {
            background-color: #4a8a4a !important;
            color: #fff !important;
            border-color: #4a8a4a !important;
          }
          .qpyodide-button:hover {
            background-color: #1A3300 !important;
            border-color: #1A3300 !important;
          }
          /* stdout output */
          .qpyodide-output-code-stdout {
            color: #d4d4d4 !important;
            background-color: #1e1e1e !important;
            font-family: 'Fira Code', monospace !important;
            font-size: 0.78em !important;
            padding: 0.6em 1em !important;
            border-left: 4px solid #7AB87A !important;
            border-top: none !important;
            display: block;
          }
          /* stderr output */
          .qpyodide-output-code-stderr {
            color: #f48771 !important;
            background-color: #1e1e1e !important;
            font-family: 'Fira Code', monospace !important;
            font-size: 0.78em !important;
            padding: 0.6em 1em !important;
            border-left: 4px solid #f48771 !important;
            display: block;
          }
          /* Monaco inline text defaults (fallback if theme not set yet) */
          .qpyodide-editor .view-lines,
          .qpyodide-editor .view-line span {
            color: #d4d4d4 !important;
          }
        </style>
        <script>
          document.addEventListener('DOMContentLoaded', function() {
            // KAU logo
            var img = document.createElement('img');
            img.id = 'kau-slide-logo';
            img.src = '../../assets/kau-logo.jpg';
            img.alt = 'KAU';
            document.body.appendChild(img);
            // Set Monaco editor to dark theme once it loads
            function applyMonacoDark() {
              if (typeof monaco !== 'undefined' && monaco.editor) {
                monaco.editor.setTheme('vs-dark');
              } else {
                setTimeout(applyMonacoDark, 400);
              }
            }
            applyMonacoDark();
          });
        </script>

filters:
  - pyodide

pyodide:
  show-startup-message: false
  packages:
    - numpy
    - pandas
    - matplotlib
    - scipy
    - statsmodels
    - seaborn

date: "2026-09-01"
date-format: "[Autumn] YYYY"

execute:
  echo: true
  eval: false
  warning: false
  message: false

